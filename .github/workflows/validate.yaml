name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          # "brands" requires a PR to the separate home-assistant/brands repo
          # (custom_integrations/flexom/icon.png) - not something this repo's
          # own files can satisfy. Confirmed live (2026-07-23): the "flexom"
          # domain has no entry there yet (neither integrations/flexom nor
          # custom_integrations/flexom), despite stray cached brand images
          # locally in this dev instance. Remove this ignore once that PR is
          # submitted and merged upstream.
          ignore: "brands"
